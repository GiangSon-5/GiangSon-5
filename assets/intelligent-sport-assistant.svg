<svg width="480" height="295" viewBox="0 0 480 295" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a371f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d2a8ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d2a8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2c5ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 1. Background rect, rx=14 -->
  <rect width="480" height="295" rx="14" fill="url(#bg)"/>
  <!-- 2. Top accent bar: height=3, rx=2, fill=accent gradient -->
  <rect width="480" height="3" rx="2" fill="url(#accent)"/>
  <!-- 3. Outer border: stroke=#30363d, stroke-width=1 -->
  <rect width="480" height="295" rx="14" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- 4. HEADER -->
  <text x="20" y="42" font-size="16" font-family="monospace" fill="#8b949e">📰</text>
  <text x="44" y="42" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="url(#title)" filter="url(#glow)">intelligent-sports-assistant</text>
  
  <!-- 5. Horizontal divider line #21262d -->
  <line x1="20" y1="54" x2="460" y2="54" stroke="#21262d" stroke-width="1"/>

  <!-- 6. DESCRIPTION -->
  <text x="20" y="76" font-family="'Segoe UI', sans-serif" font-size="12" fill="#8b949e">Automated sports intelligence system crawling VNExpress, Thanh Nien, and Tuổi Trẻ.</text>
  <text x="20" y="94" font-family="'Segoe UI', sans-serif" font-size="12" fill="#8b949e">Orchestrates Scrapy, Pandas, and LangChain to extract and analyze news patterns.</text>
  <text x="20" y="112" font-family="'Segoe UI', sans-serif" font-size="12" fill="#8b949e">Generates executive summaries and dashboards using Gemini 2.5 Flash &amp; Streamlit.</text>
  
  <!-- 7. Horizontal divider line #21262d -->
  <line x1="20" y1="124" x2="460" y2="124" stroke="#21262d" stroke-width="1"/>

  <!-- 8. TECH STACK PILLS -->
  <g>
    <rect x="20" y="136" width="48" height="20" rx="10" fill="#0c150a" stroke="#44a833" />
    <text x="44" y="150" font-family="monospace" font-size="11" fill="#44a833" text-anchor="middle">Scrapy</text>
    <rect x="74" y="136" width="48" height="20" rx="10" fill="#0a111a" stroke="#58a6ff" />
    <text x="98" y="150" font-family="monospace" font-size="11" fill="#58a6ff" text-anchor="middle">Pandas</text>
    <rect x="128" y="136" width="72" height="20" rx="10" fill="#0a141a" stroke="#79c0ff" />
    <text x="164" y="150" font-family="monospace" font-size="11" fill="#79c0ff" text-anchor="middle">LangChain</text>
    <rect x="206" y="136" width="48" height="20" rx="10" fill="#1a101a" stroke="#d2a8ff" />
    <text x="230" y="150" font-family="monospace" font-size="11" fill="#d2a8ff" text-anchor="middle">Gemini</text>
    <rect x="260" y="136" width="56" height="20" rx="10" fill="#0a141a" stroke="#017cee" />
    <text x="288" y="150" font-family="monospace" font-size="11" fill="#017cee" text-anchor="middle">Airflow</text>
    <rect x="322" y="136" width="48" height="20" rx="10" fill="#0a141a" stroke="#2496ed" />
    <text x="346" y="150" font-family="monospace" font-size="11" fill="#2496ed" text-anchor="middle">Docker</text>
    <rect x="376" y="136" width="72" height="20" rx="10" fill="#1a0f0f" stroke="#ff4b4b" />
    <text x="412" y="150" font-family="monospace" font-size="11" fill="#ff4b4b" text-anchor="middle">Streamlit</text>
  </g>

  <!-- 9. Horizontal divider line #21262d -->
  <line x1="20" y1="166" x2="460" y2="166" stroke="#21262d" stroke-width="1"/>

  <!-- 10. KEY ATTRIBUTES -->
  <text x="20" y="186" font-family="monospace" font-size="11" fill="url(#accent)">▸</text>
  <text x="32" y="186" font-family="monospace" font-size="11" fill="#8b949e">Source</text>
  <text x="110" y="186" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">VnExpress, Thanh Niên, Tuổi Trẻ (Vietnam)</text>
  <text x="20" y="204" font-family="monospace" font-size="11" fill="url(#accent)">▸</text>
  <text x="32" y="204" font-family="monospace" font-size="11" fill="#8b949e">AI Models</text>
  <text x="110" y="204" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">Google Gemini 2.5 Flash &amp; OpenAI GPT-4o</text>
  <text x="20" y="222" font-family="monospace" font-size="11" fill="url(#accent)">▸</text>
  <text x="32" y="222" font-family="monospace" font-size="11" fill="#8b949e">Pipeline</text>
  <text x="110" y="222" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">Automated daily E2E workflow via Airflow</text>
  <text x="20" y="240" font-family="monospace" font-size="11" fill="url(#accent)">▸</text>
  <text x="32" y="240" font-family="monospace" font-size="11" fill="#8b949e">Test Suite</text>
  <text x="110" y="240" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">109 tests (pytest), 70% code coverage</text>
  <text x="20" y="258" font-family="monospace" font-size="11" fill="url(#accent)">▸</text>
  <text x="32" y="258" font-family="monospace" font-size="11" fill="#8b949e">Results</text>
  <text x="110" y="258" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">Weekly Sports News Reports (Markdown &amp; PDF)</text>

  <!-- 11. FOOTER -->
  <circle cx="20" cy="276" r="5" fill="#3572A5"/>
  <text x="30" y="280" font-family="'Segoe UI', sans-serif" font-size="11" fill="#8b949e">Python 100%</text>
</svg>
