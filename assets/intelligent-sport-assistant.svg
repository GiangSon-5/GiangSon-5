<svg width="480" height="278" viewBox="0 0 480 278" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a371f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d2a8ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="480" height="278" rx="14" fill="url(#bg_grad)" />
  <rect x="0" y="0" width="480" height="3" rx="2" fill="url(#accent_grad)" />
  <rect x="0.5" y="0.5" width="479" height="277" rx="14" fill="none" stroke="#30363d" stroke-width="1" />

  <g transform="translate(20, 30)">
    <text x="0" y="0" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="url(#accent_grad)" filter="url(#glow)">📰 intelligent-sports-assistant</text>
  </g>

  <line x1="0" y1="45" x2="480" y2="45" stroke="#21262d" />

  <g transform="translate(20, 65)">
    <text font-family="'Segoe UI', sans-serif" font-size="10.5" fill="#8b949e">
      <tspan x="0" dy="0">Automated sports intelligence system crawling VNExpress, Thanh Nien, and Tuổi Trẻ.</tspan>
      <tspan x="0" dy="18">Orchestrates Scrapy, Pandas, and LangChain to extract and analyze news patterns.</tspan>
      <tspan x="0" dy="18">Generates executive summaries and dashboards using Gemini 2.5 Flash &amp; Streamlit.</tspan>
    </text>
  </g>

  <line x1="0" y1="118" x2="480" y2="118" stroke="#21262d" />

  <g transform="translate(20, 138)">
    <rect x="0" y="-14" width="45" height="20" rx="10" fill="#0c150a" stroke="#44a833" />
    <text x="22.5" y="0" font-family="monospace" font-size="10" fill="#44a833" text-anchor="middle">Scrapy</text>
    <rect x="51" y="-14" width="45" height="20" rx="10" fill="#0a111a" stroke="#58a6ff" />
    <text x="73.5" y="0" font-family="monospace" font-size="10" fill="#58a6ff" text-anchor="middle">Pandas</text>
    <rect x="102" y="-14" width="65" height="20" rx="10" fill="#0a141a" stroke="#79c0ff" />
    <text x="134.5" y="0" font-family="monospace" font-size="10" fill="#79c0ff" text-anchor="middle">LangChain</text>
    <rect x="173" y="-14" width="45" height="20" rx="10" fill="#1a101a" stroke="#d2a8ff" />
    <text x="195.5" y="0" font-family="monospace" font-size="10" fill="#d2a8ff" text-anchor="middle">Gemini</text>
    <rect x="224" y="-14" width="50" height="20" rx="10" fill="#0a141a" stroke="#017cee" />
    <text x="249" y="0" font-family="monospace" font-size="10" fill="#017cee" text-anchor="middle">Airflow</text>
    <rect x="280" y="-14" width="45" height="20" rx="10" fill="#0a141a" stroke="#2496ed" />
    <text x="302.5" y="0" font-family="monospace" font-size="10" fill="#2496ed" text-anchor="middle">Docker</text>
    <rect x="331" y="-14" width="65" height="20" rx="10" fill="#1a0f0f" stroke="#ff4b4b" />
    <text x="363.5" y="0" font-family="monospace" font-size="10" fill="#ff4b4b" text-anchor="middle">Streamlit</text>
  </g>

  <line x1="0" y1="155" x2="480" y2="155" stroke="#21262d" />

  <g transform="translate(20, 178)">
    <text x="0" y="0" font-family="'Segoe UI', sans-serif" font-size="12" fill="#a371f7">▸</text>
    <text x="12" y="0" font-family="monospace" font-size="11" fill="#8b949e">Source</text>
    <text x="110" y="0" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">VnExpress, Thanh Niên, Tuổi Trẻ (Vietnam)</text>
    
    <text x="0" y="18" font-family="'Segoe UI', sans-serif" font-size="12" fill="#a371f7">▸</text>
    <text x="12" y="18" font-family="monospace" font-size="11" fill="#8b949e">AI Models</text>
    <text x="110" y="18" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">Google Gemini 2.5 Flash &amp; OpenAI GPT-4o</text>
    
    <text x="0" y="36" font-family="'Segoe UI', sans-serif" font-size="12" fill="#a371f7">▸</text>
    <text x="12" y="36" font-family="monospace" font-size="11" fill="#8b949e">Pipeline</text>
    <text x="110" y="36" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">Automated daily E2E workflow via Airflow</text>
    
    <text x="0" y="54" font-family="'Segoe UI', sans-serif" font-size="12" fill="#a371f7">▸</text>
    <text x="12" y="54" font-family="monospace" font-size="11" fill="#8b949e">Test Suite</text>
    <text x="110" y="54" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">109 tests (pytest), 70% code coverage</text>
    
    <text x="0" y="72" font-family="'Segoe UI', sans-serif" font-size="12" fill="#a371f7">▸</text>
    <text x="12" y="72" font-family="monospace" font-size="11" fill="#8b949e">Results</text>
    <text x="110" y="72" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">Weekly Sports News Reports (Markdown &amp; PDF)</text>
  </g>

  <g transform="translate(20, 262)">
    <circle cx="5" cy="-4" r="5" fill="#3572A5" />
    <text x="15" y="0" font-family="'Segoe UI', sans-serif" font-size="11" fill="#8b949e">Python 100%</text>
  </g>
</svg>
