<svg width="480" height="260" viewBox="0 0 480 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ea043"/>
      <stop offset="100%" style="stop-color:#56d364"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7ee787"/>
      <stop offset="100%" style="stop-color:#aff5b4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="480" height="260" rx="14" fill="url(#bg)"/>
  <rect width="480" height="3" rx="2" fill="url(#accent)"/>
  <rect width="480" height="260" rx="14" fill="none" stroke="#30363d" stroke-width="1"/>

  <text x="20" y="42" font-size="16" font-family="monospace" fill="#8b949e">🏆</text>
  <text x="44" y="42" font-family="'Segoe UI', monospace" font-size="16" font-weight="700" fill="url(#title)" filter="url(#glow)">intelligent-sports-assistant</text>

  <line x1="20" y1="54" x2="460" y2="54" stroke="#21262d" stroke-width="1"/>

  <text x="20" y="76" font-family="'Segoe UI', sans-serif" font-size="12" fill="#8b949e">Automated sports intelligence system crawling VNExpress, Thanh Niên, and Tuổi Trẻ.</text>
  <text x="20" y="94" font-family="'Segoe UI', sans-serif" font-size="12" fill="#8b949e">Orchestrates Scrapy, Pandas, and LangChain to extract and analyze news patterns.</text>
  <text x="20" y="112" font-family="'Segoe UI', sans-serif" font-size="12" fill="#8b949e">Generates executive summaries and dashboards using Gemini 2.5 Flash &amp; Streamlit.</text>

  <line x1="20" y1="124" x2="460" y2="124" stroke="#21262d" stroke-width="1"/>

  <rect x="20" y="134" width="60" height="20" rx="10" fill="#1a2a1a" stroke="#2ea043" stroke-width="1"/>
  <text x="50" y="148" font-family="'Segoe UI', sans-serif" font-size="10" fill="#7ee787" text-anchor="middle">Scrapy</text>
  <rect x="88" y="134" width="60" height="20" rx="10" fill="#1a1f2e" stroke="#388bfd" stroke-width="1"/>
  <text x="118" y="148" font-family="'Segoe UI', sans-serif" font-size="10" fill="#79c0ff" text-anchor="middle">Pandas</text>
  <rect x="156" y="134" width="75" height="20" rx="10" fill="#1e1a2e" stroke="#a371f7" stroke-width="1"/>
  <text x="193.5" y="148" font-family="'Segoe UI', sans-serif" font-size="10" fill="#d2a8ff" text-anchor="middle">LangChain</text>
  <rect x="239" y="134" width="60" height="20" rx="10" fill="#2a1e1a" stroke="#f78166" stroke-width="1"/>
  <text x="269" y="148" font-family="'Segoe UI', sans-serif" font-size="10" fill="#ff9e64" text-anchor="middle">Gemini</text>
  <rect x="307" y="134" width="60" height="20" rx="10" fill="#1a2328" stroke="#56d364" stroke-width="1"/>
  <text x="337" y="148" font-family="'Segoe UI', sans-serif" font-size="10" fill="#56d364" text-anchor="middle">Airflow</text>
  <rect x="375" y="134" width="75" height="20" rx="10" fill="#2a1a2a" stroke="#f778ba" stroke-width="1"/>
  <text x="412.5" y="148" font-family="'Segoe UI', sans-serif" font-size="10" fill="#f778ba" text-anchor="middle">Streamlit</text>

  <line x1="20" y1="166" x2="460" y2="166" stroke="#21262d" stroke-width="1"/>

  <text x="20" y="186" font-family="monospace" font-size="11" fill="#2ea043">▸</text>
  <text x="32" y="186" font-family="'Segoe UI', sans-serif" font-size="11" fill="#8b949e">Sources</text>
  <text x="110" y="186" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">VnExpress, Thanh Niên, Tuổi Trẻ</text>
  <text x="20" y="204" font-family="monospace" font-size="11" fill="#2ea043">▸</text>
  <text x="32" y="204" font-family="'Segoe UI', sans-serif" font-size="11" fill="#8b949e">AI Models</text>
  <text x="110" y="204" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">Gemini 2.5 Flash, GPT-4o Fallback</text>
  <text x="20" y="222" font-family="monospace" font-size="11" fill="#2ea043">▸</text>
  <text x="32" y="222" font-family="'Segoe UI', sans-serif" font-size="11" fill="#8b949e">Pipeline</text>
  <text x="110" y="222" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">Crawl → Process → Analyze → Report</text>
  <text x="20" y="240" font-family="monospace" font-size="11" fill="#2ea043">▸</text>
  <text x="32" y="240" font-family="'Segoe UI', sans-serif" font-size="11" fill="#8b949e">Test Suite</text>
  <text x="110" y="240" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">7 Core Module Tests (Pytest)</text>

  <circle cx="20" cy="254" r="5" fill="#3572A5"/>
  <text x="30" y="258" font-family="'Segoe UI', sans-serif" font-size="11" fill="#8b949e">Python 100%</text>
</svg>
