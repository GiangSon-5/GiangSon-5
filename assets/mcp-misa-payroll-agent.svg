<svg width="480" height="260" viewBox="0 0 480 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a371f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d2a8ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="260" rx="14" fill="url(#bg_grad)" />
  <rect width="480" height="3" rx="2" fill="url(#accent_grad)" />
  <rect x="0.5" y="0.5" width="479" height="259" rx="14" fill="none" stroke="#30363d" stroke-width="1" />

  <!-- Header -->
  <g transform="translate(20, 35)">
    <text x="0" y="0" font-family="'Segoe UI', sans-serif" font-weight="600" font-size="18" fill="#d2a8ff" filter="url(#glow)">
      🤖 mcp-misa-payroll-agent-full
    </text>
  </g>
  <line x1="20" y1="50" x2="460" y2="50" stroke="#21262d" stroke-width="1" />

  <!-- Description -->
  <g transform="translate(20, 72)">
    <text font-family="'Segoe UI', sans-serif" font-size="12" fill="#8b949e">
      <tspan x="0" dy="0">Agentic Enterprise Portal automating MISA Accounting and HR Payroll.</tspan>
      <tspan x="0" dy="18">Multi-Agent system using LangGraph Pipeline and MCP for deterministic</tspan>
      <tspan x="0" dy="18">data ingestion, rule processing, and AI-driven complex reasoning.</tspan>
    </text>
  </g>
  <line x1="20" y1="120" x2="460" y2="120" stroke="#21262d" stroke-width="1" />

  <!-- Tech Stack -->
  <g transform="translate(20, 135)">
    <!-- AI Agent -->
    <rect x="0" y="0" width="70" height="20" rx="10" fill="#1a1a1a" stroke="#d2a8ff" stroke-width="1" />
    <text x="35" y="14" font-family="monospace" font-size="10" fill="#d2a8ff" text-anchor="middle">AI Agent</text>

    <!-- Pipeline -->
    <rect x="78" y="0" width="70" height="20" rx="10" fill="#1a1a1a" stroke="#56d364" stroke-width="1" />
    <text x="113" y="14" font-family="monospace" font-size="10" fill="#56d364" text-anchor="middle">Pipeline</text>

    <!-- LangGraph -->
    <rect x="156" y="0" width="75" height="20" rx="10" fill="#1a1a1a" stroke="#a371f7" stroke-width="1" />
    <text x="193.5" y="14" font-family="monospace" font-size="10" fill="#a371f7" text-anchor="middle">LangGraph</text>
    
    <!-- MCP -->
    <rect x="239" y="0" width="45" height="20" rx="10" fill="#1a1a1a" stroke="#ff9e64" stroke-width="1" />
    <text x="261.5" y="14" font-family="monospace" font-size="10" fill="#ff9e64" text-anchor="middle">MCP</text>
    
    <!-- FastAPI -->
    <rect x="292" y="0" width="60" height="20" rx="10" fill="#1a1a1a" stroke="#05998b" stroke-width="1" />
    <text x="322" y="14" font-family="monospace" font-size="10" fill="#05998b" text-anchor="middle">FastAPI</text>
    
    <!-- Gemini -->
    <rect x="360" y="0" width="60" height="20" rx="10" fill="#1a1a1a" stroke="#4a86e8" stroke-width="1" />
    <text x="390" y="14" font-family="monospace" font-size="10" fill="#4a86e8" text-anchor="middle">Gemini</text>
  </g>
  <line x1="20" y1="165" x2="460" y2="165" stroke="#21262d" stroke-width="1" />

  <!-- Key Attributes -->
  <g transform="translate(20, 178)">
    <!-- Row 1 -->
    <text x="0" y="0" font-family="monospace" font-size="11" fill="#a371f7">▸</text>
    <text x="12" y="0" font-family="monospace" font-size="11" fill="#8b949e">Architecture:</text>
    <text x="105" y="0" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">Multi-Agent Orchestration via LangGraph</text>
    
    <!-- Row 2 -->
    <text x="0" y="18" font-family="monospace" font-size="11" fill="#a371f7">▸</text>
    <text x="12" y="18" font-family="monospace" font-size="11" fill="#8b949e">AI Models:</text>
    <text x="105" y="18" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">Gemini 1.5, Qwen 2.5 (Colab), GPT-4o Fallback</text>
    
    <!-- Row 3 -->
    <text x="0" y="36" font-family="monospace" font-size="11" fill="#a371f7">▸</text>
    <text x="12" y="36" font-family="monospace" font-size="11" fill="#8b949e">AI Pipeline:</text>
    <text x="105" y="36" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">Ingest → Rule Engine → AI Reasoning → Export</text>
    
    <!-- Row 4 -->
    <text x="0" y="54" font-family="monospace" font-size="11" fill="#a371f7">▸</text>
    <text x="12" y="54" font-family="monospace" font-size="11" fill="#8b949e">Efficiency:</text>
    <text x="105" y="54" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">96% Success Rate &amp; 65x Process Acceleration</text>
  </g>

  <!-- Footer -->
  <g transform="translate(20, 250)">
    <circle cx="5" cy="-4" r="5" fill="#3572A5" />
    <text x="15" y="0" font-family="'Segoe UI', sans-serif" font-size="11" fill="#8b949e">Python 100%</text>
  </g>
</svg>
